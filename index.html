<!-- MÃ NGUỒN ỔN ĐỊNH NHẤT - TÍCH HỢP QUẢN TRỊ NÂNG CAO, GIỚI HẠN GỢI Ý & BÁO LỖI (HÌNH ẢNH) -->
<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> KHOA HỌC TỰ NHIÊN 9 - Bài 8. THẤU KÍNH/<title>
    <!-- Hỗ trợ công thức Toán/Lí -->
    <script>
        window.MathJax = {
            tex: { inlineMath: [['$', '$'], ['\\(', '\\)']], displayMath: [['$$', '$$']] },
            svg: { fontCache: 'global' }
        };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <!-- Thư viện hiệu ứng và tiện ích -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    
    <style>
        :root {
            --primary: #1e40af; --secondary: #3b82f6; --success: #10b981; --danger: #ef4444; 
            --bg: #0f172a; --card: #ffffff; --text: #1e293b; --accent: #f59e0b;
        }
        
        * { -webkit-user-select: none !important; -moz-user-select: none !important; -ms-user-select: none !important; user-select: none !important; -webkit-touch-callout: none !important; }
        input, textarea { -webkit-user-select: text !important; -moz-user-select: text !important; -ms-user-select: text !important; user-select: text !important; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; overflow-x: hidden; -webkit-tap-highlight-color: transparent; }
        
        .container { max-width: 1100px; margin: 0 auto; min-height: 850px; display: flex; flex-direction: column; position: relative; z-index: 1; transform-origin: top center; transition: transform 0.2s ease-out; }
        
        .q-img { display: block; max-width: 100%; max-height: 280px; margin: 15px auto; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); border: 1px solid #e2e8f0; background: #fff; }
        #custom-alert { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: var(--danger); color: white; padding: 12px 25px; border-radius: 50px; font-weight: bold; z-index: 100000; box-shadow: 0 10px 25px rgba(239, 68, 68, 0.4); display: none; animation: slideInAlert 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); border: 2px solid white; font-size: 0.95rem; text-transform: uppercase; text-align: center; }
        @keyframes slideInAlert { from { top: -50px; opacity: 0; } to { top: 20px; opacity: 1; } }

        .fire-text { display: inline-block; color: #fff; text-shadow: 0 0 10px #ff8d00, 0 0 20px #ff4e00, 0 0 30px #d43300; animation: burn 1.5s infinite alternate; }
        @keyframes burn { 0% { transform: skew(0.5deg); text-shadow: 0 0 10px #ff8d00, 0 0 20px #ff4e00; } 100% { transform: skew(-0.5deg); text-shadow: 0 0 15px #ff8d00, 0 0 35px #ff4e00, 0 0 50px #ff0000; } }

        header { background: rgba(30, 64, 175, 0.95); backdrop-filter: blur(5px); color: white; padding: 15px 20px; display: none; justify-content: space-between; align-items: center; box-shadow: 0 4px 15px rgba(0,0,0,0.5); position: sticky; top: 0; z-index: 100; }
        .timer { background: #fee2e2; color: #dc2626; padding: 8px 20px; border-radius: 20px; font-weight: bold; border: 2px solid #ef4444; font-size: 1.1rem; }

        #wish-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 10000; display: none; flex-direction: column; justify-content: center; align-items: center; pointer-events: none; text-align: center; overflow: hidden; }
        #fire-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        .wish-content { z-index: 10001; position: relative; width: 90%; max-width: 800px; }
        .wish-title { font-size: 5rem; font-weight: 900; color: #fff; text-transform: uppercase; margin: 0; animation: wishSharp 5s ease-out forwards; text-shadow: 0 0 20px #ff4e00, 0 0 50px #ffae00; }
        .wish-sub { font-size: 1.8rem; color: #fff; margin-top: 20px; opacity: 0; animation: fadeInSub 1s forwards 0.5s; font-weight: 600; }
        
        .cheat-warning-box { background: #ef4444; color: #fff; padding: 15px 30px; border-radius: 15px; font-size: 1.3rem; font-weight: 900; border: 4px solid #facc15; box-shadow: 0 0 30px rgba(239, 68, 68, 0.8); margin: 40px auto 0 auto; display: none; z-index: 10002; text-transform: uppercase; animation: pulseWarning 1.2s infinite; max-width: 650px; line-height: 1.4; }
        @keyframes wishSharp { 0% { transform: scale(0.6); opacity: 0; } 15% { transform: scale(1); opacity: 1; } 90% { transform: scale(1); opacity: 1; } 100% { transform: scale(1.2); opacity: 0; } }
        @keyframes fadeInSub { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes pulseWarning { 0% { transform: scale(1); background: #ef4444; } 50% { transform: scale(1.03); background: #dc2626; } 100% { transform: scale(1); background: #ef4444; } }

        .screen { display: none; padding: 20px; animation: fadeIn 0.4s ease; }
        .screen.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .school-brand { text-align: center; padding: 50px 20px; background: linear-gradient(180deg, rgba(30, 64, 175, 1) 0%, rgba(15, 23, 42, 1) 100%); color: white; border-radius: 0 0 50px 50px; margin: -20px auto 30px auto; border-bottom: 4px solid #ff4e00; max-width: 800px; width: 95%; box-shadow: 0 10px 25px rgba(0,0,0,0.3); }
        .card { background: var(--card); padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); margin-bottom: 25px; border: 1px solid #e2e8f0; }
        .section-title { background: #f1f5f9; padding: 12px 18px; border-left: 6px solid #ff4e00; font-weight: bold; margin-bottom: 20px; color: var(--primary); font-size: 1.1rem; text-transform: uppercase; }

        .option { border: 2px solid #e2e8f0; border-radius: 12px; padding: 14px 20px; margin-bottom: 12px; cursor: pointer; transition: 0.3s; background: #fff; font-size: 1rem; }
        .option.selected { border-color: #ff4e00; background: #fff7ed; font-weight: bold; }
        .option.correct { background: #d1fae5; border-color: var(--success); color: #065f46; font-weight: bold; }
        .option.wrong { background: #fee2e2; border-color: var(--danger); color: #991b1b; }
        
        .tf-row { display: flex; justify-content: space-between; align-items: center; padding: 15px 0; border-bottom: 1px solid #f1f5f9; gap: 10px; }
        .tf-btn { border: 2px solid #cbd5e0; background: white; padding: 8px 18px; border-radius: 10px; cursor: pointer; font-weight: bold; min-width: 65px; transition: 0.2s; }
        .tf-btn.active-t { background: var(--success); color: white; border-color: var(--success); }
        .tf-btn.active-f { background: var(--danger); color: white; border-color: var(--danger); }

        .btn { padding: 12px 24px; border-radius: 12px; border: none; font-weight: 800; cursor: pointer; transition: 0.3s; text-transform: uppercase; }
        .btn-fire { background: linear-gradient(45deg, #ff4e00, #ff8d00); color: white; box-shadow: 0 4px 15px rgba(255, 78, 0, 0.4); }
        .btn-gray { background: #cbd5e0; color: #475569; }
        
        .btn-admin-float { position: fixed; bottom: 20px; right: 20px; z-index: 1000; background: #475569; color: white; border-radius: 50px; padding: 10px 20px; font-size: 0.8rem; box-shadow: 0 4px 10px rgba(0,0,0,0.3); opacity: 0.8; cursor: pointer; border: none; }
        .btn-report-float { position: fixed; bottom: 20px; left: 20px; z-index: 1000; background: var(--danger); color: white; border-radius: 50px; padding: 10px 20px; font-size: 0.8rem; box-shadow: 0 4px 10px rgba(239,68,68,0.4); opacity: 0.9; cursor: pointer; border: 2px solid #fff; font-weight: bold; }

        input[type="text"], input[type="password"], input[type="number"], textarea { padding: 15px; border: 2px solid #e2e8f0; border-radius: 12px; width: 100%; box-sizing: border-box; outline: none; transition: 0.3s; font-size: 1rem; }
        input[type="text"]:focus, input[type="number"]:focus, textarea:focus { border-color: #ff4e00; }

        .rank-badge { font-size: 1.5rem; font-weight: 900; margin-top: 15px; padding: 10px 25px; border-radius: 50px; display: inline-block; animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); color: white; }
        
        .admin-controls { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 20px; background: #f1f5f9; padding: 15px; border-radius: 15px; align-items: flex-end; }
        .admin-table-container { overflow-x: auto; background: white; border-radius: 10px; border: 1px solid #e2e8f0; max-height: 500px; overflow-y: auto;}
        .admin-table { width: 100%; border-collapse: collapse; min-width: 1000px; }
        .admin-table th { background: var(--primary); color: white; padding: 12px; text-align: left; font-size: 0.85rem; position: sticky; top: 0; z-index: 10; }
        .admin-table td { padding: 12px; border-bottom: 1px solid #f1f5f9; font-size: 0.9rem; }
        .stat-box { flex: 1; min-width: 130px; background: white; padding: 15px; border-radius: 15px; text-align: center; border-bottom: 4px solid #cbd5e0; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }

        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 20000; display: none; justify-content: center; align-items: center; padding: 20px; overflow-y: auto;}
        .modal-box { background: white; padding: 30px; border-radius: 25px; width: 100%; max-width: 500px; text-align: center; position: relative; margin: auto; }
        
        #cheat-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.98); z-index: 30000; display: none; justify-content: center; align-items: center; text-align: center; padding: 20px;}
        footer { padding: 40px 20px; text-align: center; color: #94a3b8; background: #0f172a; font-size: 0.85rem; border-top: 2px solid #1e293b; margin-top: auto; }

        .badge-mode { padding: 4px 8px; border-radius: 4px; font-size: 0.7rem; font-weight: bold; color: white; text-transform: uppercase; }
        .badge-test { background: var(--danger); }
        .badge-practice { background: var(--secondary); }

        .short-answer-wrapper { display: flex; gap: 12px; justify-content: center; margin: 25px 0; }
        .char-slot { width: 50px; height: 60px; border: 3px solid #cbd5e0; border-radius: 10px; text-align: center; font-size: 1.8rem; font-weight: 900; color: var(--primary); outline: none; }
        .char-slot:focus { border-color: var(--accent); background: #fff7ed; }

        .explanation { margin-top: 15px; padding: 12px; background: #f8fafc; border-radius: 10px; border: 1px solid #e2e8f0; font-size: 0.9rem; color: #475569; line-height: 1.5; }
        .score-badge { float: right; padding: 2px 10px; border-radius: 20px; font-size: 0.7rem; font-weight: bold; }
        .score-plus { background: #dcfce7; color: #166534; }
        .score-zero { background: #fee2e2; color: #991b1b; }

        @media (max-width: 640px) {
            .wish-title { font-size: 3rem; }
            .wish-sub { font-size: 1.3rem; }
            .card { padding: 20px 15px; }
            #final-score { font-size: 4rem; }
            .tf-row { flex-direction: column; align-items: flex-start; gap: 8px; }
            .tf-btn { width: 100%; }
            .btn-admin-float, .btn-report-float { font-size: 0.7rem; padding: 8px 15px; bottom: 10px;}
        }
    </style>
</head>

<body oncontextmenu="return false" oncopy="return false" oncut="return false" onpaste="return false">

<div id="custom-alert">⚠️ Vui lòng hoàn thành câu hỏi này!</div>

<div id="wish-overlay">
    <canvas id="fire-canvas"></canvas>
    <div class="wish-content">
        <h1 class="wish-title">🔥 CỐ LÊN! 🔥</h1>
        <p class="wish-sub">Chúc bạn hoàn thành tốt bài làm!</p>
        <div id="wish-cheat-info" class="cheat-warning-box">HỆ THỐNG SẼ TỰ ĐỘNG NỘP BÀI<br>NẾU CHUYỂN TAB, CHIA ĐÔI MÀN HÌNH<br>HOẶC MỞ ỨNG DỤNG KHÁC</div>
    </div>
</div>

<button id="btn-admin-open" class="btn-admin-float">QUẢN TRỊ 🔐</button>
<button id="btn-report-open" class="btn-report-float">BÁO LỖI ⚠️</button>

<div id="confirm-finish-modal" class="modal-overlay">
    <div class="modal-box">
        <h2 style="color: var(--primary)">Xác nhận nộp bài?</h2>
        <p>Bạn có chắc chắn muốn kết thúc bài làm và xem kết quả ngay không?</p>
        <div style="display:flex; gap:10px; margin-top:20px;">
            <button id="btn-modal-cancel" class="btn btn-gray" style="flex:1">LÀM TIẾP</button>
            <button id="btn-modal-confirm" class="btn btn-fire" style="flex:1">NỘP BÀI</button>
        </div>
    </div>
</div>

<!-- Modal Báo Lỗi Học Sinh -->
<div id="report-modal" class="modal-overlay">
    <div class="modal-box" style="text-align: left;">
        <h2 style="color: var(--danger); text-align: center; margin-top: 0; margin-bottom: 20px; font-size: 1.5rem;">GỬI BÁO LỖI</h2>
        <div style="margin-bottom: 15px;">
            <label style="font-size: 0.8rem; font-weight: bold; color: #64748b;">Vị trí câu lỗi / Lỗi gặp phải:</label>
            <input type="text" id="report-question" placeholder="Ví dụ: Câu 5 phần Đ/S, Hình ảnh câu 2...">
        </div>
        <div style="margin-bottom: 15px;">
            <label style="font-size: 0.8rem; font-weight: bold; color: #64748b;">Mô tả chi tiết:</label>
            <textarea id="report-detail" rows="3" placeholder="Ghi rõ lỗi sai đáp án, lỗi chính tả, hoặc lỗi hiển thị..."></textarea>
        </div>
        <div style="margin-bottom: 15px;">
            <label style="font-size: 0.8rem; font-weight: bold; color: #64748b;">Đính kèm hình ảnh (Tùy chọn):</label>
            <input type="file" id="report-file" accept="image/*" style="padding: 10px; font-size: 0.85rem;">
            <img id="report-img-preview" src="" style="max-width: 100%; max-height: 150px; margin-top: 10px; display: none; border-radius: 8px; border: 1px solid #ccc; object-fit: contain;">
        </div>
        <div style="display:flex; gap:10px; margin-top:20px;">
            <button id="btn-report-cancel" class="btn btn-gray" style="flex:1">HỦY</button>
            <button id="btn-report-submit" class="btn btn-fire" style="flex:1; background: var(--danger);">GỬI PHẢN HỒI</button>
        </div>
    </div>
</div>

<div id="cheat-modal">
    <div style="background: white; padding: 50px 30px; border-radius: 30px; max-width: 550px; border: 10px solid var(--danger);">
        <h1 style="color:var(--danger); font-size: 3rem; margin:0">CẢNH BÁO!</h1>
        <p style="font-size: 1.2rem; margin: 25px 0; color: #1e293b; font-weight: bold; line-height: 1.5;">
            Hệ thống phát hiện bạn đã rời khỏi trình duyệt, chia đôi màn hình hoặc mở cửa sổ nổi. Bài làm đã tự động thu lại vì lí do bảo mật.
        </p>
        <button id="btn-cheat-submit" class="btn btn-fire" style="width:100%;">XEM KẾT QUẢ</button>
    </div>
</div>

<!-- Modal Hộp thư báo lỗi (Admin) -->
<div id="admin-inbox-modal" class="modal-overlay">
    <div class="card" style="width:100%; max-width:900px; text-align:left; max-height: 90vh; overflow-y: auto;">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 20px; border-bottom: 2px solid #e2e8f0; padding-bottom: 15px;">
            <h2 style="color: var(--danger); margin:0;">HỘP THƯ BÁO LỖI 📩</h2>
            <button id="btn-inbox-close" class="btn btn-gray" style="padding: 8px 15px; font-size:0.8rem;">ĐÓNG ✖</button>
        </div>
        <div class="admin-table-container">
            <table class="admin-table" style="min-width: 800px;">
                <thead><tr><th>Thời gian</th><th>Người báo</th><th>Vị trí lỗi</th><th>Chi tiết</th><th>Đính kèm</th><th>Thao tác</th></tr></thead>
                <tbody id="inbox-list-body"></tbody>
            </table>
        </div>
    </div>
</div>

<!-- Modal Xem Ảnh Phóng To -->
<div id="image-viewer-modal" class="modal-overlay" style="z-index: 40000;" onclick="this.style.display='none'">
    <img id="image-viewer-img" src="" style="max-width: 90%; max-height: 90%; border-radius: 10px; box-shadow: 0 10px 30px rgba(0,0,0,0.5);">
    <p style="color: white; position: absolute; bottom: 20px; font-weight: bold; text-shadow: 0 2px 4px rgba(0,0,0,0.8);">Chạm bất kỳ đâu để đóng</p>
</div>

<div id="app-wrapper" style="width: 100%; overflow-x: hidden;">
    <div class="container">
        <header id="main-header">
            <div style="font-weight: 900; letter-spacing: 1px; color: #facc15;">HUE SMART TEST 7991</div>
            <div class="timer" id="timer">--:--</div>
        </header>

        <section id="screen-start" class="screen active">
            <div class="school-brand">
                <h1 class="fire-text" style="font-size: 2.2rem;">ÔN TẬP KHOA HỌC TỰ NHIÊN 9 (PHYSICS) </h1>
                <p style="color:white; opacity:0.8; margin-top:5px;">Chuyên đề: Bài 8. Thấu kính</p>
            </div>

            <div class="card" style="max-width: 550px; margin: -40px auto 30px auto; position: relative; z-index: 2; display: block;">
                <h3 style="text-align:center; margin-bottom: 20px; color: var(--primary);">NHẬP THÔNG TIN THÍ SINH</h3>
                <p id="start-error" style="color: var(--danger); text-align: center; font-weight: bold; margin-bottom: 15px; display: none;">⚠️ Vui lòng điền đầy đủ các thông tin!</p>
                <div style="margin-bottom: 15px;"><label style="font-size: 0.8rem; font-weight: bold; color: #64748b;">Họ và tên:</label><input type="text" id="username" placeholder="Nhập tên hoặc để trống (mặc định 'input')"></div>
                <div style="margin-bottom: 15px;"><label style="font-size: 0.8rem; font-weight: bold; color: #64748b;">Trường:</label><input type="text" id="user_school" placeholder="Nhập trường hoặc để trống (mặc định 'input')"></div>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                    <div style="margin-bottom: 15px;"><label style="font-size: 0.8rem; font-weight: bold; color: #64748b;">Lớp:</label><input type="text" id="user_class" placeholder="Ví dụ: 9A1"></div>
                    <div style="margin-bottom: 25px;"><label style="font-size: 0.8rem; font-weight: bold; color: #64748b;">Số báo danh:</label><input type="text" id="user_sbd" placeholder="Ví dụ: 01"></div>
                </div>
                
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                    <button id="btn-init-practice" class="btn btn-gray">LUYỆN TẬP</button>
                    <button id="btn-init-test" class="btn btn-fire">KIỂM TRA</button>
                </div>
            </div>
        </section>

        <section id="screen-quiz" class="screen">
            <div id="quiz-content"></div>
            <div style="display:flex; justify-content: space-between; margin-top: 30px; gap: 15px;">
                <button id="btn-prev" class="btn btn-gray">QUAY LẠI</button>
                <button class="btn btn-fire" id="btn-next" style="flex:1">TIẾP THEO</button>
                <button id="btn-finish" class="btn" style="background:var(--success); color:white; display:none">HOÀN THÀNH 🏁</button>
            </div>
        </section>

        <section id="screen-result" class="screen">
            <div class="card" style="background: linear-gradient(135deg, #1e40af, #1e1b4b); color: white; text-align: center; padding: 40px 20px;">
                <h2 id="res-name" class="fire-text">HỌC SINH</h2>
                <div id="res-meta">Thông tin</div>
                <div style="margin: 30px 0;">
                    <div id="final-score" style="font-size: 6rem; font-weight: 900; color: #fff; text-shadow: 0 0 20px rgba(255,255,255,0.5);">0.0</div>
                    <div id="my-rank-text" style="margin-top: 10px; font-weight: bold; color: #ffae00; font-size: 1.8rem;">HẠNG ...</div>
                </div>
                <div id="rank-container"><div id="rank-badge" class="rank-badge">XẾP LOẠI</div></div>
            </div>
            <div style="display:flex; flex-direction: column; gap: 15px; margin-top: 20px;">
                <button id="btn-view-review" class="btn btn-fire">GIẢI THÍCH CHI TIẾT 📖</button>
                <button class="btn btn-gray" onclick="location.reload()">LÀM ĐỀ KHÁC</button>
            </div>
            <div id="review-area" style="display:none; margin-top: 30px;">
                <h2 id="review-heading" style="text-align:center; color: var(--primary); margin: 30px 0;">CHI TIẾT BÀI LÀM</h2>
                <div id="review-content"></div>
            </div>
        </section>

        <!-- Màn hình Admin -->
        <section id="screen-admin" class="screen">
            <div style="display:flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h2 class="fire-text" style="margin:0; font-size: 1.5rem;">📊 QUẢN LÍ KẾT QUẢ</h2>
                <button id="btn-admin-close" class="btn btn-gray" style="padding: 5px 15px; font-size: 0.7rem;">THOÁT</button>
            </div>

    const currentHeight = window.innerHeight;
    container.style.marginBottom = '0px';

    if (currentHeight < baseHeight) {
        const ratio = currentHeight / baseHeight;
        container.style.transform = `scale(${ratio})`;
        setTimeout(() => {
            const realHeight = container.offsetHeight; 
            wrapper.style.height = `${realHeight * ratio}px`;

    short: [
        { q: "Một vật sáng $AB$ cao $2 cm$ đặt vuông góc với trục chính của một thấu kính hội tụ có tiêu cự $f = 10 cm$. Vật cách thấu kính một khoảng $d = 20 cm$. Độ cao của ảnh $A'B'$ thu được là bao nhiêu $cm$?", a: "2", e: "Khi $d = 2f = 20 cm$, vật nằm tại vị trí đặc biệt. Sơ đồ hình học: $\\frac{h'}{h} = \\frac{d'}{d}$. Tính được $d' = 20 cm \\Rightarrow h' = h = 2 cm$." },
        { q: "Đặt một vật sáng $AB$ trước thấu kính hội tụ có tiêu cự $f = 15 cm$. Để thu được một ảnh thật có kích thước bằng vật, phải đặt vật cách thấu kính một khoảng bao nhiêu $cm$?", a: "30", e: "Để ảnh thật bằng vật, vật phải đặt tại vị trí $d = 2f = 2 \\times 15 = 30 cm$." },
        { q: "Vật sáng $AB$ đặt vuông góc với trục chính của thấu kính hội tụ có tiêu cự $12 cm$. Ảnh thu được là ảnh thật cách thấu kính $d' = 24 cm$. Khoảng cách từ vật đến thấu kính $d$ là bao nhiêu $cm$?", a: "24", e: "Ta thấy $d' = 24 cm = 2f$. Ảnh thật cách thấu kính $2f$ thì vật cũng phải cách thấu kính một khoảng $d = 2f = 2 \\times 12 = 24 cm$." },
        { q: "Một thấu kính hội tụ tạo ảnh thật $A'B'$ cao gấp $3$ lần vật $AB$. Biết ảnh cách thấu kính $60 cm$. Khoảng cách từ vật đến thấu kính là bao nhiêu $cm$?", a: "20", e: "Tỉ lệ độ cao ảnh và vật: $\\frac{h'}{h} = \\frac{d'}{d} \\Rightarrow 3 = \\frac{60}{d} \\Rightarrow d = 20 cm$." },
        { q: "Vật sáng cách thấu kính hội tụ $40 cm$, thấu kính có tiêu cự $20 cm$. Khoảng cách từ ảnh đến thấu kính là bao nhiêu $cm$?", a: "40", e: "Ta có $d = 40 cm$ và $f = 20 cm \\Rightarrow d = 2f$. Khi vật ở vị trí $2f$, ảnh thật cũng ở vị trí $d' = 2f = 40 cm$." },
        { q: "Một nhóm học sinh thực hiện thí nghiệm vẽ đường truyền tia sáng:<br>1. Tia tới qua quang tâm truyền thẳng.<br>2. Tia tới song song trục chính cho tia ló đi qua tiêu điểm vật $F$.<br>3. Tia tới qua tiêu điểm vật $F$ cho tia ló song song trục chính.<br>4. Tia tới qua tiêu điểm ảnh $F'$ luôn bị phản xạ ngược lại.<br>5. Trục chính là đường thẳng đi qua quang tâm và vuông góc với mặt thấu kính.<br>6. Mọi tia tới thấu kính đều phải đi qua tiêu điểm $F$.<br>7. Tia tới trùng với trục chính sẽ truyền thẳng.<br>8. Tia ló của tia qua quang tâm sẽ đi qua tiêu điểm ảnh $F'$.<br><br><b>Chọn các nhận định ĐÚNG rồi ghi đáp án bằng một dãy số tăng dần từ nhỏ đến lớn.</b>", a: "1357", e: "Nhận định 1, 3, 5, 7 ĐÚNG. Nhận định 2 sai (qua $F'$). Nhận định 4, 6, 8 sai." },
        { q: "Nhận định về ảnh tạo bởi thấu kính phân kì:<br>1. Luôn là ảnh ảo.<br>2. Luôn cùng chiều với vật.<br>3. Có thể lớn hơn hoặc nhỏ hơn vật tùy vị trí.<br>4. Luôn nhỏ hơn vật.<br>5. Có thể hứng được trên màn nếu vật ở rất xa.<br>6. Ảnh nằm trong khoảng tiêu cự của thấu kính.<br>7. Ảnh luôn nằm ở phía bên kia thấu kính so với vật.<br>8. Ảnh ảo được tạo bởi giao điểm của chùm tia ló.<br><br><b>Chọn các nhận định ĐÚNG rồi ghi đáp án bằng một dãy số tăng dần từ nhỏ đến lớn.</b>", a: "1246", e: "Nhận định 1, 2, 4, 6 ĐÚNG. Nhận định 3, 5, 7, 8 sai." },

let fireRequest;
function startFire() {
    const canvas = document.getElementById('fire-canvas');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;
    let flames = [];
    class Flame {
        constructor() {
            this.x = Math.random() * canvas.width; this.y = canvas.height + 100; this.size = Math.random() * 100 + 60;
            this.vx = Math.random() * 2 - 1; this.vy = Math.random() * -4 - 3; this.life = 1.0; this.decay = Math.random() * 0.01 + 0.006;
        }
        update() { this.x += this.vx + Math.sin(this.life * 10) * 1.5; this.y += this.vy; this.life -= this.decay; this.size *= 0.992; }
        draw() {
            if (this.life <= 0) return;
            ctx.save(); ctx.translate(this.x, this.y); ctx.beginPath(); ctx.moveTo(0, 0);
            ctx.bezierCurveTo(-this.size/2.5, -this.size/2, -this.size/3, -this.size*0.8, 0, -this.size * 1.3);
            ctx.bezierCurveTo(this.size/3, -this.size*0.8, this.size/2.5, -this.size/2, 0, 0);
            let color = this.life > 0.8 ? `rgba(255, 255, 255, ${this.life})` : (this.life > 0.5 ? `rgba(255, 220, 0, ${this.life})` : (this.life > 0.2 ? `rgba(255, 80, 0, ${this.life})` : `rgba(200, 0, 0, ${this.life})`));
            ctx.fillStyle = color; ctx.shadowBlur = this.size / 3; ctx.shadowColor = "#ff4e00"; ctx.fill(); ctx.restore();
        }
    }
    function animate() {
        if (document.getElementById('wish-overlay').style.display === 'none') return;
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        if (flames.length < 55) flames.push(new Flame());
        for (let i = 0; i < flames.length; i++) { flames[i].update(); flames[i].draw(); if (flames[i].life <= 0) { flames.splice(i, 1); i--; } }
        fireRequest = requestAnimationFrame(animate);
    }
    animate();
}

function renderQuestion() {
    const q = currentExam[currentIdx];
    const container = document.getElementById('quiz-content');
    const labels = ['A', 'B', 'C', 'D'];
    let html = `<div class="section-title">${q.section}</div><div class="card">`;
    
    let expHtml = q.e;
    if (q.type === 'mcq') expHtml = `Phương án <b>${q.a}</b> là đúng.<br><br>${q.e}`;
    else if (q.type === 'short') expHtml = `Đáp án đúng là <b>${q.a}</b>.<br><br>${q.e}`;

    if(mode === 'practice') {
        let hintBtnText = unlockedHints.includes(q.id) ? "ĐÃ MỞ GỢI Ý 💡" : `XEM GỢI Ý 💡 (Còn ${maxHintsAllowed - hintsUsed})`;
        html += `<button class="btn-hint" id="hint-trigger" style="padding: 8px 15px; border-radius: 8px; border: 2px solid var(--accent); background: #fffbeb; color: #b45309; font-weight: bold; cursor: pointer; margin-bottom: 15px;">${hintBtnText}</button><div id="hint-box" class="hint-box" style="display: none; margin-bottom: 15px; padding: 12px; background: #f8fafc; border-radius: 10px; border: 1px solid #e2e8f0; font-size: 0.9rem; color: #475569; line-height: 1.5;"><b>Hướng dẫn giải:</b><br>${expHtml}</div>`;
    }
    
    if(q.type === 'mcq') {
        html += `<h3>Câu ${q.displayNum}. ${q.q}</h3>`;
        if(q.img) html += `<img src="${q.img}" class="q-img" alt="Ảnh minh họa" onerror="this.style.display='none'">`;
        if(!q.shuffledOptions) q.shuffledOptions = shuffle([...q.o]);
        q.shuffledOptions.forEach((o, idx) => {
            const isSelected = userAnswers[q.id] === o;
            html += `<div class="option ${isSelected?'selected':''}" data-ans="${o.replace(/"/g, '&quot;')}"><b>${labels[idx]}.</b> ${o}</div>`;
        });
    } else if(q.type === 'tf') {
        html += `<h3>Câu ${q.displayNum}</h3><div style="background:#f1f5f9; padding:15px; border-radius:12px; margin-bottom:15px; font-style:italic;">${q.ctx}</div>`;
        if(q.img) html += `<img src="${q.img}" class="q-img" alt="Ảnh minh họa" onerror="this.style.display='none'">`;
        q.sts.forEach((st, si) => {
            let val = (userAnswers[q.id]||{})[si];
            html += `<div class="tf-row"><span style="flex:1"><b>${st.l}</b> ${st.t}</span><div style="display:flex; gap:10px;"><button class="tf-btn ${val===true?'active-t':''}" data-si="${si}" data-val="true">Đúng</button><button class="tf-btn ${val===false?'active-f':''}" data-si="${si}" data-val="false">Sai</button></div></div>`;
        });
    } else {
        html += `<h3>Câu ${q.displayNum}. ${q.q}</h3>`;
        if(q.img) html += `<img src="${q.img}" class="q-img" alt="Ảnh minh họa" onerror="this.style.display='none'">`;
        const currentVal = (userAnswers[q.id] || "").padEnd(4, " ");
        html += `<div class="short-answer-wrapper"><input type="text" class="char-slot" maxlength="1" value="${currentVal[0] !== ' ' ? currentVal[0] : ''}" data-idx="0"><input type="text" class="char-slot" maxlength="1" value="${currentVal[1] !== ' ' ? currentVal[1] : ''}" data-idx="1"><input type="text" class="char-slot" maxlength="1" value="${currentVal[2] !== ' ' ? currentVal[2] : ''}" data-idx="2"><input type="text" class="char-slot" maxlength="1" value="${currentVal[3] !== ' ' ? currentVal[3] : ''}" data-idx="3"></div><p style="color:var(--danger); font-size:0.75rem; font-weight:bold; text-align:center;">Lưu ý: Nhập mỗi ký tự vào một ô</p>`;
    }
    container.innerHTML = html + `</div>`;
    
    if(q.type === 'mcq') {
        container.querySelectorAll('.option').forEach(el => el.onclick = () => { userAnswers[q.id] = el.getAttribute('data-ans'); audioPing.play().catch(()=>{}); renderQuestion(); });
    } else if(q.type === 'tf') {
        container.querySelectorAll('.tf-btn').forEach(el => el.onclick = () => {
            const si = el.getAttribute('data-si'), val = el.getAttribute('data-val') === 'true';
            if(!userAnswers[q.id]) userAnswers[q.id] = {}; userAnswers[q.id][si] = val; audioPing.play().catch(()=>{}); renderQuestion();
        });
    } else {
        const slots = container.querySelectorAll('.char-slot');
        slots.forEach((slot, idx) => {
            slot.oninput = (e) => {
                const val = e.target.value; if (val && idx < 3) slots[idx + 1].focus();
                let combined = ""; slots.forEach(s => combined += (s.value || " "));
                userAnswers[q.id] = combined.trim();
            };
            slot.onkeydown = (e) => { if (e.key === 'Backspace' && !e.target.value && idx > 0) slots[idx - 1].focus(); };
        });
    }
    
    // LOGIC NÚT GỢI Ý
    const hb = document.getElementById('hint-trigger');
    if(hb) {
        hb.onclick = async () => { 
            const b = document.getElementById('hint-box'); 
            const isH = b.style.display === 'none'; 
            
            if (isH && !unlockedHints.includes(q.id)) {
                if (hintsUsed >= maxHintsAllowed) {
                    showCustomAlert("⚠️ Bạn đã hết lượt xem gợi ý!");
                    return;
                }
                hintsUsed++;
                unlockedHints.push(q.id);
                hb.innerText = "ĐÃ MỞ GỢI Ý 💡";
            }
            
            b.style.display = isH ? 'block' : 'none'; 
            if(isH && window.MathJax) await MathJax.typesetPromise([b]); 
            autoScaleApp(); 
        };
    }

    document.getElementById('btn-prev').style.visibility = currentIdx === 0 ? 'hidden' : 'visible';
    document.getElementById('btn-next').style.display = currentIdx === currentExam.length - 1 ? 'none' : 'block';
    document.getElementById('btn-finish').style.display = currentIdx === currentExam.length - 1 ? 'block' : 'none';
    if(window.MathJax) MathJax.typesetPromise().then(autoScaleApp); else setTimeout(autoScaleApp, 50);
}

async function calculateResult() {
    if(!isQuizRunning && !isProcessingCheat) return;
    
    if(wishTimeoutId) clearTimeout(wishTimeoutId);
    isQuizRunning = false; canCheckCheat = false; clearInterval(timerInt); audioFinish.play().catch(()=>{});
    
    // Hiện lại nút Báo lỗi
    document.getElementById('btn-report-open').style.display = 'block';

    const dur = Math.floor((Date.now() - quizStartTime) / 1000);
    let score = 0; const tfMap = {0:0, 1:0.05, 2:0.125, 3:0.25, 4:0.5};
    currentExam.forEach(q => {
        const norm = (s) => (s || "").toString().trim().replace(',','.');
        if(q.type === 'mcq' && norm(userAnswers[q.id]||'') === norm(q.a)) score += 0.25;
        else if(q.type === 'tf') { let cp = 0, u = userAnswers[q.id] || {}; q.sts.forEach((st, si) => { if(u[si] === st.a) cp++; }); score += tfMap[cp] || 0; }
        else if(q.type === 'short' && norm(userAnswers[q.id]||'') === norm(q.a)) score += 0.5;
    });
    const fs = parseFloat(Math.min(10, score).toFixed(1)); // Max 10 điểm
    
    document.getElementById('wish-overlay').style.display = 'none'; cancelAnimationFrame(fireRequest);
    showScreen('screen-result'); document.getElementById('main-header').style.display = 'none';
    document.getElementById('final-score').innerText = fs.toFixed(1);
    const u = window.finalUserData;
    document.getElementById('res-name').innerText = (u.name || "input").toUpperCase();
    document.getElementById('res-meta').innerText = `${u.sch || "input"} | Lớp ${u.cls || "input"} | SBD ${u.sbd || "input"}`;
    
    let rb = document.getElementById('rank-badge'), txt = 'CHƯA ĐẠT', col = '#64748b';
    if(fs >= 9.0) { txt='XUẤT SẮC'; col='#f59e0b'; } else if(fs >= 8.0) { txt='GIỎI'; col='#10b981'; } else if(fs >= 6.5) { txt='KHÁ'; col='#3b82f6'; } else if(fs >= 5.0) { txt='ĐẠT'; col='#8b5cf6'; }
    rb.innerText = txt; rb.style.background = col;
    if(fs >= 5.0) confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });

    if(currentUser) {
        try { 
            // LƯU TOÀN BỘ ĐỀ THI VÀ BÀI LÀM LÊN FIREBASE ĐỂ ADMIN XEM LẠI
            await addDoc(collection(db, 'artifacts', appId_fixed, 'public', 'data', collectionName), { 
                name: u.name, school: u.sch, sbd: u.sbd, class: u.cls, score: fs, duration: dur, mode: mode, timestamp: new Date().toISOString(),
                examData: currentExam, userAnswers: userAnswers 
            }); 
        } catch(e) { console.error(e); }
    }
    fetchRankAndLeaderboard(fs);
}

async function fetchRankAndLeaderboard(myScore) {
    try {
        const snap = await getDocs(collection(db, 'artifacts', appId_fixed, 'public', 'data', collectionName));
        let list = []; snap.forEach(d => list.push(d.data()));
        list = list.filter(r => (r.mode === 'test' || !r.mode));
        list.sort((a,b) => b.score - a.score || a.duration - b.duration);
        const myRank = list.findIndex(r => r.name === window.finalUserData.name && r.score === myScore) + 1;
        if(myRank > 0) document.getElementById('my-rank-text').innerText = `HẠNG ${myRank} / ${list.length}`;
        else document.getElementById('my-rank-text').innerText = `KẾT QUẢ LUYỆN TẬP`;
    } catch (e) {}
}

function viewAdminReview(docId) {
    const record = window.currentFilteredData.find(d => d.id === docId);
    if (!record || !record.examData) { alert("Không có dữ liệu chi tiết cho bài làm này!"); return; }
    
    document.getElementById('ar-name').innerText = `${record.name} - Điểm: ${record.score}`;
    arExamData = record.examData; arUserAnswers = record.userAnswers || {};
    
    const content = document.getElementById('ar-content');
    let h = '', labels = ['A', 'B', 'C', 'D'];
    const norm = (s) => (s || "").toString().trim().replace(',','.');
    const tfMapReview = {0:0, 1:0.05, 2:0.125, 3:0.25, 4:0.5};
    
    arExamData.forEach(q => {
        let qText = q.type === 'tf' ? `Câu ${q.displayNum} (Đúng/Sai)` : `Câu ${q.displayNum}. ${q.q}`;
        let itemScore = 0, scoreHTML = '';
        if(q.type === 'mcq') { itemScore = norm(arUserAnswers[q.id]||'') === norm(q.a) ? 0.25 : 0; scoreHTML = `<span class="score-badge ${itemScore > 0 ? 'score-plus' : 'score-zero'}">${itemScore > 0 ? '+'+itemScore : '0'}đ</span>`; }
        else if(q.type === 'short') { itemScore = norm(arUserAnswers[q.id]||'') === norm(q.a) ? 0.5 : 0; scoreHTML = `<span class="score-badge ${itemScore > 0 ? 'score-plus' : 'score-zero'}">${itemScore > 0 ? '+'+itemScore : '0'}đ</span>`; }
        else if(q.type === 'tf') { let cp = 0; q.sts.forEach((st, si) => { if((arUserAnswers[q.id]||{})[si] === st.a) cp++; }); itemScore = tfMapReview[cp] || 0; scoreHTML = `<span class="score-badge ${itemScore > 0 ? 'score-plus' : 'score-zero'}">Đúng ${cp}/4 ý (${itemScore > 0 ? '+'+itemScore : '0'}đ)</span>`; }
        
        h += `<div style="border-left: 5px solid ${itemScore > 0 ? 'var(--success)' : 'var(--danger)'}; padding-left: 15px; margin-bottom: 25px;"><h4>${qText} ${scoreHTML}</h4>`;
        if(q.img) h += `<img src="${q.img}" style="max-width:200px; display:block; margin: 10px 0; border: 1px solid #ccc; border-radius: 8px;">`; 
        
        if(q.type === 'mcq') {
            (q.shuffledOptions || q.o).forEach((o, idx) => {
                const isC = norm(o) === norm(q.a), isU = arUserAnswers[q.id] === o;
                h += `<div style="padding: 8px; margin: 5px 0; border-radius: 5px; background: ${isC ? '#d1fae5' : (isU ? '#fee2e2' : '#f8fafc')}; border: 1px solid ${isC ? 'var(--success)' : (isU ? 'var(--danger)' : '#e2e8f0')}"><b>${labels[idx]}.</b> ${o} ${isC?'✓':(isU?'✗':'')}</div>`;
            });
        } else if(q.type === 'tf') {
            q.sts.forEach((st, si) => {
                let uV = (arUserAnswers[q.id]||{})[si], isC = (uV === st.a);
                h += `<div style="padding: 5px; border-bottom:1px solid #e2e8f0;">${st.l} ${st.t} <br><span style="font-size:0.8rem;">Bạn: <b style="color:${isC?'#10b981':'#ef4444'}">${uV===true?'Đúng':(uV===false?'Sai':'Trống')}</b> | Đáp án: <b>${st.a?'Đúng':'Sai'}</b></span></div>`;
            });
        } else {
            const isC = norm(arUserAnswers[q.id]||'') === norm(q.a);
            h += `<div style="padding: 8px; background: #f8fafc; border-radius: 5px;">Bạn nhập: <b style="color:${isC?'#10b981':'#ef4444'}">${arUserAnswers[q.id]||'Trống'}</b> <br> Đáp án: <b style="color:#10b981">${q.a}</b></div>`;
        }
        h += `</div>`;
    });
    content.innerHTML = h; 
    document.getElementById('admin-review-modal').style.display = 'flex';
    if(window.MathJax) MathJax.typesetPromise([content]);
}

// TÍNH NĂNG TẠO ĐỀ THI LÀM LẠI CÁC CÂU SAI
document.getElementById('btn-ar-retry').onclick = () => {
    let wrongQuestions = []; let newQCount = 1;
    const norm = (s) => (s || "").toString().trim().replace(',','.');
    
    // Lọc các câu bị sai hoặc bỏ trống
    arExamData.forEach(q => {
        let isWrong = false;
        if (q.type === 'mcq' && norm(arUserAnswers[q.id]) !== norm(q.a)) isWrong = true;
        else if (q.type === 'short' && norm(arUserAnswers[q.id]) !== norm(q.a)) isWrong = true;
        else if (q.type === 'tf') {
            let cp = 0; q.sts.forEach((st, si) => { if((arUserAnswers[q.id]||{})[si] === st.a) cp++; });
            if (cp < 4) isWrong = true; // Chỉ cần sai 1 ý là phải làm lại cả câu
        }
        if (isWrong) {
            let clonedQ = JSON.parse(JSON.stringify(q));
            clonedQ.displayNum = newQCount++;
            wrongQuestions.push(clonedQ);
        }
    });

    if (wrongQuestions.length === 0) { alert("Tuyệt vời! Học sinh này đã làm đúng toàn bộ 100%."); return; }

    // Chuyển thẳng về màn hình làm bài với bộ đề sai
    document.getElementById('admin-review-modal').style.display = 'none';
    document.getElementById('screen-admin').classList.remove('active');
    
    // Hiện nút báo lỗi vì đang luyện tập
    document.getElementById('btn-report-open').style.display = 'block';

    currentExam = wrongQuestions;
    userAnswers = {}; currentIdx = 0; mode = 'practice'; // Cho làm lại ở chế độ Luyện tập để xem được gợi ý
    isQuizRunning = true; timeLeft = practiceTimeLimit; quizStartTime = Date.now();

    document.getElementById('main-header').style.display = 'flex';
    showScreen('screen-quiz'); renderQuestion(); startTimer();
    alert(`Đã khởi tạo đề thi với ${wrongQuestions.length} câu làm sai. Bắt đầu làm bài!`);
};

// Đọc và nén ảnh bằng Canvas
document.getElementById('report-file').addEventListener('change', function(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = function(event) {
        const img = new Image();
        img.onload = function() {
            const canvas = document.createElement('canvas');
            const MAX_WIDTH = 800;
            const MAX_HEIGHT = 800;
            let width = img.width;
            let height = img.height;

            if (width > height) {
                if (width > MAX_WIDTH) { height *= MAX_WIDTH / width; width = MAX_WIDTH; }
            } else {
                if (height > MAX_HEIGHT) { width *= MAX_HEIGHT / height; height = MAX_HEIGHT; }
            }
            canvas.width = width; canvas.height = height;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0, width, height);
            
            reportImageBase64 = canvas.toDataURL('image/jpeg', 0.7); // Nén ảnh thành chuỗi base64 (70% quality)
            document.getElementById('report-img-preview').src = reportImageBase64;
            document.getElementById('report-img-preview').style.display = 'block';
        }
        img.src = event.target.result;
    }
    reader.readAsDataURL(file);
});

// XỬ LÍ HỘP THƯ LỖI (ADMIN)
async function renderAdminInbox() {
    document.getElementById('admin-inbox-modal').style.display = 'flex';
    const listBody = document.getElementById('inbox-list-body');
    listBody.innerHTML = "<tr><td colspan='6'>Đang tải hộp thư...</td></tr>";
    try {
        const snap = await getDocs(collection(db, 'artifacts', appId_fixed, 'public', 'data', collectionReports));
        let reports = []; snap.forEach(d => reports.push({id: d.id, ...d.data()}));
        reports.sort((a,b) => new Date(b.timestamp) - new Date(a.timestamp));
        
        if (reports.length === 0) {
            listBody.innerHTML = "<tr><td colspan='6' style='text-align:center;'>Hộp thư trống. Chưa có báo cáo nào!</td></tr>";
            return;
        }

        listBody.innerHTML = reports.map(r => `
            <tr>
                <td><small>${new Date(r.timestamp).toLocaleString('vi-VN')}</small></td>
                <td><b>${r.name}</b></td>
                <td>${r.question || '-'}</td>
                <td>${r.detail || '-'}</td>
                <td>${r.image ? `<button class="btn btn-gray btn-view-img" data-img="${r.image}" style="padding:4px 8px; font-size:0.7rem;">Xem ảnh 🖼️</button>` : '-'}</td>
                <td><button class="btn-del-report" data-id="${r.id}" style="background:var(--danger); color:white; border:none; padding:4px 8px; border-radius:4px; cursor:pointer;">Đã sửa / Xóa</button></td>
            </tr>
        `).join('');

        // Gắn sự kiện Xóa báo cáo
        listBody.querySelectorAll('.btn-del-report').forEach(b => {
            b.onclick = async () => {
                if (confirm("Xóa báo cáo lỗi này khỏi hộp thư?")) {
                    b.innerText = "..."; b.disabled = true;
                    await deleteDoc(doc(db, 'artifacts', appId_fixed, 'public', 'data', collectionReports, b.dataset.id));
                    renderAdminInbox(); // Cập nhật lại list
                }
            }
        });
        
        // Gắn sự kiện Xem ảnh phóng to
        listBody.querySelectorAll('.btn-view-img').forEach(b => {
            b.onclick = () => {
                document.getElementById('image-viewer-img').src = b.dataset.img;
                document.getElementById('image-viewer-modal').style.display = 'flex';
            }
        });

    } catch(e) { 
        listBody.innerHTML = "<tr><td colspan='6'>Lỗi kết nối hộp thư.</td></tr>"; 
    }
}

document.getElementById('btn-view-review').onclick = () => {
    const area = document.getElementById('review-area'), content = document.getElementById('review-content'), labels = ['A', 'B', 'C', 'D'];
    area.style.display = 'block'; let h = '';
    const norm = (s) => (s || "").toString().trim().replace(',','.');
    const tfMapReview = {0:0, 1:0.05, 2:0.125, 3:0.25, 4:0.5};
    currentExam.forEach(q => {
        let qText = q.type === 'tf' ? `Câu ${q.displayNum} (Đúng/Sai)` : `Câu ${q.displayNum}. ${q.q}`;
        let itemScore = 0, scoreHTML = '';
        if(q.type === 'mcq') { itemScore = norm(userAnswers[q.id]||'') === norm(q.a) ? 0.25 : 0; scoreHTML = `<span class="score-badge ${itemScore > 0 ? 'score-plus' : 'score-zero'}">${itemScore > 0 ? '+'+itemScore : '0'}đ</span>`; } 
        else if(q.type === 'short') { itemScore = norm(userAnswers[q.id]||'') === norm(q.a) ? 0.5 : 0; scoreHTML = `<span class="score-badge ${itemScore > 0 ? 'score-plus' : 'score-zero'}">${itemScore > 0 ? '+'+itemScore : '0'}đ</span>`; } 
        else if(q.type === 'tf') { let cp = 0; q.sts.forEach((st, si) => { if((userAnswers[q.id]||{})[si] === st.a) cp++; }); itemScore = tfMapReview[cp] || 0; scoreHTML = `<span class="score-badge ${itemScore > 0 ? 'score-plus' : 'score-zero'}">Đúng ${cp}/4 ý (${itemScore > 0 ? '+'+itemScore : '0'}đ)</span>`; }
        
        h += `<div class="card" style="border-left: 8px solid var(--primary)"><h3>${qText} ${scoreHTML}</h3>`;
        if(q.img) h += `<img src="${q.img}" class="q-img" alt="Ảnh minh họa">`; 
        
        if(q.type === 'mcq') {
            (q.shuffledOptions || q.o).forEach((o, idx) => {
                const isC = norm(o) === norm(q.a), isU = userAnswers[q.id] === o;
                h += `<div class="option ${isC?'correct':(isU?'wrong':'')}"><b>${labels[idx]}.</b> ${o} ${isC?'✓':(isU?'✗':'')}</div>`;
            });
            if(norm(userAnswers[q.id]||'') !== norm(q.a)) h += `<div class="review-choice-box review-wrong" style="padding:10px; border-radius:8px; margin-top:10px; background:#fee2e2; border:1px solid #ef4444;">Bạn chọn: <b>${userAnswers[q.id]||'Chưa chọn'}</b>. Đáp án: <b style="color:#10b981">${q.a}</b></div>`;
        } else if(q.type === 'tf') {
            h += `<div style="background:#f1f5f9; padding:15px; border-radius:12px; margin-bottom:15px; font-style:italic;">${q.ctx}</div>`;
            q.sts.forEach((st, si) => {
                let uV = (userAnswers[q.id]||{})[si], isC = (uV === st.a);
                h += `<div class="tf-row" style="display:flex; justify-content:space-between; align-items:center; padding:10px 0; border-bottom:1px solid #f1f5f9;"><span>${st.l} ${st.t}</span><div style="font-size:0.8rem; text-align:right;"><span style="color:${isC?'#10b981':'#ef4444'}">Bạn: <b>${uV===true?'Đúng':(uV===false?'Sai':'?')}</b></span><br><span>Đáp án: <b>${st.a?'Đúng':'Sai'}</b> ${isC?'✓':'✗'}</span></div></div>`;
            });
        } else {
            const isC = norm(userAnswers[q.id]||'') === norm(q.a);
            h += `<p>Bạn nhập: <b style="color:${isC?'#10b981':'#ef4444'}">${userAnswers[q.id]||'Trống'}</b></p><p>Đáp án đúng: <b style="color:#10b981">${q.a}</b> ${isC?'✓':'✗'}</p>`;
        }
        
        let expHtml = q.e;
        if (q.type === 'mcq') expHtml = `Phương án <b>${q.a}</b> là đúng.<br><br>${q.e}`; else if (q.type === 'short') expHtml = `Đáp án đúng là <b>${q.a}</b>.<br><br>${q.e}`;
        h += `<div class="explanation"><b>Giải thích:</b><br>${expHtml}</div></div>`;
    });
    content.innerHTML = h; 
    const target = document.getElementById('review-heading');
    if (target) { setTimeout(async () => { const y = target.getBoundingClientRect().top + window.pageYOffset - 20; window.scrollTo({ top: y, behavior: 'smooth' }); if(window.MathJax) await MathJax.typesetPromise([content]); autoScaleApp(); }, 150); }
};

function showScreen(id) { document.querySelectorAll('.screen').forEach(s => s.classList.remove('active')); document.getElementById(id).classList.add('active'); setTimeout(autoScaleApp, 50); }
function shuffle(a) { for (let i = a.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [a[i], a[j]] = [a[j], a[i]]; } return a; }
function startTimer() { clearInterval(timerInt); timerInt = setInterval(() => { timeLeft--; const m = Math.floor(timeLeft/60), s = timeLeft%60, el = document.getElementById('timer'); if(el) el.innerText = `${m}:${s.toString().padStart(2,'0')}`; if(timeLeft <= 0) calculateResult(); }, 1000); }

const triggerCheat = () => { 
    if (canCheckCheat && isQuizRunning && mode === 'test' && !isProcessingCheat) { 
        isProcessingCheat = true; 
        isQuizRunning = false; 
        calculateResult(); 
        document.getElementById('cheat-modal').style.display = 'flex';

};

// 1. Chuyển tab hoặc ẩn cửa sổ
document.addEventListener('visibilitychange', () => { 
    if(canCheckCheat && isQuizRunning && mode === 'test' && document.visibilityState === 'hidden') { 
        triggerCheat(); 
    } 
});

// 2. Mất tiêu điểm (Mở cửa sổ nổi, bấm sang màn hình khác)
window.addEventListener('blur', () => { 
    setTimeout(() => { 
        if (canCheckCheat && isQuizRunning && mode === 'test' && !document.hasFocus()) { 
            triggerCheat(); 
        } 
    }, 200); // Rút ngắn thời gian bắt để nhạy hơn
});

// 3. Thay đổi kích thước (Chia đôi màn hình)
window.addEventListener('resize', () => {
    if (canCheckCheat && isQuizRunning && mode === 'test') {
        const currentWidth = window.innerWidth;
        const initialWidth = window.testInitialWidth || currentWidth;
        // Nếu chiều ngang bị thu hẹp đáng kể (ví dụ > 150px) do kéo chia đôi màn hình
        if (Math.abs(currentWidth - initialWidth) > 150) {
            triggerCheat();
        }
    }
});
